broken_link_policy: "error"
required_runbook_sections:
  - "Purpose"
  - "When to use"
  - "Preconditions"
  - "Inputs needed"
  - "Step-by-step actions"
  - "Success criteria"
  - "Failure branches"
  - "Escalation path"
  - "Related commands"
  - "Related docs"
  - "Common mistakes"
  - "Rollback or safe exit"
required_playbook_sections:
  - "Symptom summary"
  - "Severity guidance"
  - "First 5 minutes"
  - "Triage questions"
  - "Evidence to collect"
  - "Likely causes"
  - "Safe immediate actions"
  - "Unsafe actions to avoid"
  - "Escalation thresholds"
  - "Recovery path"
  - "Validation after recovery"
  - "Related commands, logs, docs"
docs_lint_blocking_rules:
  - "missing_owner_metadata"
  - "broken_local_link"
  - "missing_required_section"
  - "empty_section"
