global_audit_pulse_lane_rules:
  missed_pulse_visibility: "explicit"
  stale_pulse_action: "reject_as_current"
  delivery_without_ack: "block_clean_pass"
  no_safe_transfer: "preserve"
  sovereignty_transfer: "preserve"
  residue_visibility: "explicit"
